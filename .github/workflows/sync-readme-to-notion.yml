name: Sync README to Notion

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - scripts/sync-readme-to-notion.mjs
      - .github/workflows/sync-readme-to-notion.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Sync README to Notion
        run: node scripts/sync-readme-to-notion.mjs
        env:
          README_PATH: README.md
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          NOTION_TARGET_PAGE_ID: ${{ secrets.NOTION_TARGET_PAGE_ID }}
